        node.element.querySelectorAll('.port, .resize-handle').forEach(p => { p.dataset.nodeId = n.id; });
        autoResizeNode(node);
      });

      (data.connections || []).forEach(c => {
        createConnection(c.fromNodeId, c.fromPort, c.toNodeId, c.toPort, c.label || '',
          { from: c.fromAnchored, to: c.toAnchored }, c.waypoints);
      });

      const maxSeq = Object.values(state.nodes).reduce((m, n) => Math.max(m, n.seq || 0), 0);
      state.seqCounter = maxSeq;

      history.length = 0;
      redoStack = [];
      updateUndoButton();
      updateRedoButton();
    }

    // ── PNG Export ─────────────────────────────────────────────────────────────

    // Vector export. Re-uses the live DOM + CSS via <foreignObject> so the output
    // matches the canvas exactly and stays crisp at any zoom in a browser.
    function exportSVG() {
      const nodes = Object.values(state.nodes);
      if (nodes.length === 0) {
        alert('Nothing to export — add some components first.');
        return;
      }
      // Drop transient edit handles (endpoint/waypoint dots) from the output.
      clearSelection();

      const PAD = 48;
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const n of nodes) {
        minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
        maxX = Math.max(maxX, n.x + n.width); maxY = Math.max(maxY, n.y + n.height);
      }
      // Connection curves/waypoints may bow outside the node bounds.
      for (const c of Object.values(state.connections)) {
        if (!c.pathElement) continue;
        let bb; try { bb = c.pathElement.getBBox(); } catch (_) { continue; }
        minX = Math.min(minX, bb.x); minY = Math.min(minY, bb.y);
        maxX = Math.max(maxX, bb.x + bb.width); maxY = Math.max(maxY, bb.y + bb.height);
      }
      minX -= PAD; minY -= PAD; maxX += PAD; maxY += PAD;
      const W = maxX - minX, H = maxY - minY;

      const SVGNS = 'http://www.w3.org/2000/svg';
      const XHTML = 'http://www.w3.org/1999/xhtml';
      const svg = document.createElementNS(SVGNS, 'svg');
      svg.setAttribute('xmlns', SVGNS);
      svg.setAttribute('width', W);
      svg.setAttribute('height', H);
      svg.setAttribute('viewBox', `${minX} ${minY} ${W} ${H}`);

      // Embed the page's CSS so the foreignObject HTML renders standalone.
      // (Plain text node — XMLSerializer escapes it and the XML parser restores
      // it on load, so CSS round-trips losslessly. createCDATASection() is not
      // allowed on an HTML document and would throw.)
      const css = Array.from(document.querySelectorAll('style')).map(s => s.textContent).join('\n');
      const styleEl = document.createElementNS(SVGNS, 'style');
      styleEl.textContent = css;
      svg.appendChild(styleEl);

      // Background.
      const bg = document.createElementNS(SVGNS, 'rect');
      bg.setAttribute('x', minX); bg.setAttribute('y', minY);
      bg.setAttribute('width', W); bg.setAttribute('height', H);
      bg.setAttribute('fill', '#f9fafb');
      svg.appendChild(bg);

      // Connection layer (native vector paths, world coords) + arrowhead defs.
      const defs = canvasSvg.querySelector('defs');
      if (defs) svg.appendChild(defs.cloneNode(true));
      for (const c of Object.values(state.connections)) {
        if (!c.pathElement) continue;
        const p = c.pathElement.cloneNode(true);
        p.removeAttribute('class');
        p.setAttribute('fill', 'none');
        p.setAttribute('stroke', '#94a3b8');
        p.setAttribute('stroke-width', '1.5');
        p.setAttribute('marker-end', 'url(#arrowhead)');
        svg.appendChild(p);
      }

      // Node + label layer (real HTML, so it looks identical and text stays selectable).
      const fo = document.createElementNS(SVGNS, 'foreignObject');
      fo.setAttribute('x', minX); fo.setAttribute('y', minY);
      fo.setAttribute('width', W); fo.setAttribute('height', H);

      const wrapper = document.createElementNS(XHTML, 'div');
      wrapper.setAttribute('xmlns', XHTML);
      const cs = getComputedStyle(nodes[0].element);
      wrapper.setAttribute('style',
        `position:absolute; left:0; top:0; width:${W}px; height:${H}px;` +
        ` transform:translate(${-minX}px,${-minY}px); transform-origin:0 0;` +
        ` font-family:${cs.fontFamily};`);

      for (const n of nodes) {
        const clone = n.element.cloneNode(true);
        clone.querySelectorAll('.port, .resize-handle, .node-connect-btn, .node-toggle-btn')
          .forEach(e => e.remove());
        clone.classList.remove('selected', 'dimmed', 'connected-highlight', 'rb-highlight');
        wrapper.appendChild(clone);
      }
      for (const c of Object.values(state.connections)) {
        if (c.labelElement && c.label) {
          const lc = c.labelElement.cloneNode(true);
          lc.querySelectorAll('.conn-label-editor').forEach(e => e.remove());
          wrapper.appendChild(lc);
        }
      }
      fo.appendChild(wrapper);
      svg.appendChild(fo);

      const xml = '<?xml version="1.0" encoding="UTF-8"?>\n' + new XMLSerializer().serializeToString(svg);
      const input = window.prompt('Save as:', 'flow-diagram');
      if (input === null) return;
      const filename = (input.trim() || 'flow-diagram').replace(/\.svg$/i, '') + '.svg';
      const blob = new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function exportPNG() {
      const nodes = Object.values(state.nodes);
      if (nodes.length === 0) {
        alert('Nothing to export — add some components first.');
        return;
      }

      const PAD = 48;
      const SCALE = 2;

      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const n of nodes) {
        minX = Math.min(minX, n.x);
        minY = Math.min(minY, n.y);
        maxX = Math.max(maxX, n.x + n.width);
        maxY = Math.max(maxY, n.y + n.height);
      }

      const W = maxX - minX + PAD * 2;
      const H = maxY - minY + PAD * 2;
      const ox = minX - PAD;
      const oy = minY - PAD;

      const canvas = document.createElement('canvas');
      canvas.width = W * SCALE;
      canvas.height = H * SCALE;
      const ctx = canvas.getContext('2d');
      ctx.scale(SCALE, SCALE);

      ctx.fillStyle = '#f9fafb';
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = '#d1d5db';
      for (let gx = 0; gx < W; gx += 24) {
        for (let gy = 0; gy < H; gy += 24) {
          ctx.beginPath();
          ctx.arc(gx, gy, 1, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      for (const conn of Object.values(state.connections)) {
        pngDrawConnection(ctx, conn, ox, oy);
      }

      for (const node of nodes) {
        pngDrawNode(ctx, node, ox, oy);
      }

      const input = window.prompt('Save as:', 'flow-diagram');
      if (input === null) return;
      const filename = (input.trim() || 'flow-diagram').replace(/\.png$/i, '') + '.png';
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function pngDrawConnection(ctx, conn, ox, oy) {
      const wps = conn.waypoints || [];
      if (wps.length) {
        // Straight polyline through the waypoints.
        const start = nodeBorderToward(conn.fromNodeId, wps[0]);
        const end = nodeBorderToward(conn.toNodeId, wps[wps.length - 1]);
        const pts = [start, ...wps, end].map(p => ({ x: p.x - ox, y: p.y - oy }));

        ctx.save();
        ctx.strokeStyle = '#94a3b8';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.stroke();
        ctx.restore();

        const last = pts[pts.length - 1], prev = pts[pts.length - 2];
        pngDrawArrowheadAngle(ctx, last.x, last.y, Math.atan2(last.y - prev.y, last.x - prev.x));

        if (conn.label) {
          const mid = pts[Math.floor((pts.length - 1) / 2)];
          const nxt = pts[Math.floor((pts.length - 1) / 2) + 1] || mid;
          pngDrawConnLabel(ctx, conn.label, (mid.x + nxt.x) / 2, (mid.y + nxt.y) / 2);
        }
        return;
      }

      const from = getPortCenter(conn.fromNodeId, conn.fromPort);
      const to = getPortCenter(conn.toNodeId, conn.toPort);

      const fx = from.x - ox, fy = from.y - oy;
      const tx = to.x - ox, ty = to.y - oy;

      const dx = Math.abs(tx - fx);
      const dy = Math.abs(ty - fy);
      const offset = Math.max(60, (dx + dy) * 0.3);

      const vec = {
        top: { cx: 0, cy: -offset },
        right: { cx: offset, cy: 0 },
        bottom: { cx: 0, cy: offset },
        left: { cx: -offset, cy: 0 }
      };

      const c1x = fx + vec[conn.fromPort].cx, c1y = fy + vec[conn.fromPort].cy;
      const c2x = tx + vec[conn.toPort].cx, c2y = ty + vec[conn.toPort].cy;

      ctx.save();
      ctx.strokeStyle = '#94a3b8';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(fx, fy);
      ctx.bezierCurveTo(c1x, c1y, c2x, c2y, tx, ty);
      ctx.stroke();
      ctx.restore();

      pngDrawArrowhead(ctx, tx, ty, conn.toPort);

      if (conn.label) {
        const t = 0.5, mt = 1 - t;
        const mx = mt * mt * mt * fx + 3 * mt * mt * t * c1x + 3 * mt * t * t * c2x + t * t * t * tx;
        const my = mt * mt * mt * fy + 3 * mt * mt * t * c1y + 3 * mt * t * t * c2y + t * t * t * ty;
        pngDrawConnLabel(ctx, conn.label, mx, my);
      }
    }

    function pngDrawArrowhead(ctx, x, y, port) {
      const S = 9;
      ctx.fillStyle = '#94a3b8';
      ctx.beginPath();
      if (port === 'left') {
        ctx.moveTo(x, y);
        ctx.lineTo(x - S, y - S * 0.45);
        ctx.lineTo(x - S, y + S * 0.45);
      } else if (port === 'right') {
        ctx.moveTo(x, y);
        ctx.lineTo(x + S, y - S * 0.45);
        ctx.lineTo(x + S, y + S * 0.45);
      } else if (port === 'top') {
        ctx.moveTo(x, y);
        ctx.lineTo(x - S * 0.45, y - S);
        ctx.lineTo(x + S * 0.45, y - S);
      } else {
        ctx.moveTo(x, y);
        ctx.lineTo(x - S * 0.45, y + S);
        ctx.lineTo(x + S * 0.45, y + S);
      }
      ctx.closePath();
      ctx.fill();
    }

    // Arrowhead pointing along an arbitrary angle (for straight/waypoint paths).
    function pngDrawArrowheadAngle(ctx, x, y, angle) {
      const S = 9;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.fillStyle = '#94a3b8';
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(-S, -S * 0.45);
      ctx.lineTo(-S, S * 0.45);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function pngDrawConnLabel(ctx, label, mx, my) {
      ctx.save();
      ctx.font = '11px ui-sans-serif, system-ui, sans-serif';
      const lines = String(label).split('\n');
      const lineH = 14, padX = 4, padY = 2;
      let maxW = 0;
      for (const ln of lines) maxW = Math.max(maxW, ctx.measureText(ln).width);
      const w = maxW + padX * 2;
      const h = lines.length * lineH + padY * 2;
      ctx.fillStyle = '#ffffff';
      ctx.strokeStyle = '#e5e7eb';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.rect(mx - w / 2, my - h / 2, w, h);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#111827';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const top = my - ((lines.length - 1) * lineH) / 2;
      lines.forEach((ln, i) => ctx.fillText(ln, mx, top + i * lineH));
      ctx.restore();
    }

    function pngDrawNode(ctx, node, ox, oy) {
      const x = node.x - ox;
      const y = node.y - oy;
      const w = node.width;
      const h = node.height;
      const hasNotes = !node.collapsed && node.notes && node.notes.trim();

      ctx.save();

      switch (node.type) {
        case 'start':
        case 'end':
          pngPill(ctx, x, y, w, h, '#dcfce7', '#86efac');
          if (hasNotes) {
            pngText(ctx, node.label, x + w / 2, y + 16, w - 16, 'center');
            pngDrawNotes(ctx, node.notes, x + 12, y + 32, w - 24, y + h - 8);
          } else {
            pngText(ctx, node.label, x + w / 2, y + h / 2, w - 16, 'center');
          }
          break;

        case 'process':
          pngRoundRect(ctx, x, y, w, h, 6, '#dbeafe', '#93c5fd');
          if (hasNotes) {
            pngText(ctx, node.label, x + w / 2, y + 16, w - 16, 'center');
            pngDrawNotes(ctx, node.notes, x + 10, y + 32, w - 20, y + h - 8);
          } else {
            pngText(ctx, node.label, x + w / 2, y + h / 2, w - 16, 'center');
          }
          break;

        case 'decision':
          pngDiamond(ctx, x, y, w, h, '#fef9c3', '#fde047');
          if (hasNotes) {
            pngText(ctx, node.label, x + w / 2, y + h * 0.36, w * 0.62, 'center');
            pngDrawNotes(ctx, node.notes, x + w * 0.25, y + h * 0.48, w * 0.5, y + h * 0.78);
          } else {
            pngText(ctx, node.label, x + w / 2, y + h / 2, w * 0.62, 'center');
          }
          break;

        case 'note':
          pngNote(ctx, x, y, w, h, '#fefce8', '#fde047');
          pngText(ctx, node.label, x + 10, y + 14, w - 20, 'left');
          if (hasNotes) pngDrawNotes(ctx, node.notes, x + 10, y + 32, w - 20, y + h - 8);
          break;

        case 'database':
          pngDatabase(ctx, x, y, w, h, '#f3e8ff', '#ede9fe', '#c084fc');
          if (hasNotes) {
            pngText(ctx, node.label, x + w / 2, y + 28, w - 16, 'center');
            pngDrawNotes(ctx, node.notes, x + 10, y + 44, w - 20, y + h - 14);
          } else {
            pngText(ctx, node.label, x + w / 2, y + h * 0.6, w - 16, 'center');
          }
          break;

        case 'api': {
          const headerH = 22;
          pngApi(ctx, x, y, w, h, '#fff7ed', '#fb923c');
          pngText(ctx, node.label, x + w / 2, y + headerH + 12, w - 16, 'center');
          let sectionY = y + headerH + 28;
          if (hasNotes) {
            sectionY = pngDrawNotes(ctx, node.notes, x + 8, sectionY, w - 16, y + h - 8) + 4;
          }
          if (node.apiRequest) {
            ctx.font = 'bold 8px -apple-system, sans-serif';
            ctx.fillStyle = '#c2410c'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
            ctx.fillText('REQUEST', x + 8, sectionY);
            sectionY += 11;
            ctx.font = '9px -apple-system, sans-serif';
            ctx.fillStyle = '#52525b';
            const reqLines = node.apiRequest.slice(0, 80).split('\n').slice(0, 3);
            reqLines.forEach(l => { ctx.fillText(l.slice(0, 28), x + 8, sectionY); sectionY += 11; });
          }
          if (node.apiResponse) {
            sectionY += 3;
            ctx.font = 'bold 8px -apple-system, sans-serif';
            ctx.fillStyle = '#c2410c'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
            ctx.fillText('RESPONSE', x + 8, sectionY);
            sectionY += 11;
            ctx.font = '9px -apple-system, sans-serif';
            ctx.fillStyle = '#52525b';
            const resLines = node.apiResponse.slice(0, 80).split('\n').slice(0, 3);
            resLines.forEach(l => { ctx.fillText(l.slice(0, 28), x + 8, sectionY); sectionY += 11; });
          }
          break;
        }

        case 'queue':
          pngQueue(ctx, x, y, w, h, '#ccfbf1', '#2dd4bf');
          if (hasNotes) {
            pngText(ctx, node.label, x + w / 2, y + 16, w - 24, 'center');
            pngDrawNotes(ctx, node.notes, x + 14, y + 32, w - 28, y + h - 8);
          } else {
            pngText(ctx, node.label, x + w / 2, y + h / 2, w - 24, 'center');
          }
          break;
      }

      // Sequence badge
      if (node.seq) {
        const bx = x - 6, by = y - 6, br = 9;
        ctx.fillStyle = '#6366f1';
        ctx.beginPath();
        ctx.arc(bx, by, br, 0, 2 * Math.PI);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 8px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(node.seq), bx, by);
      }

      ctx.restore();
    }

    function pngPill(ctx, x, y, w, h, fill, stroke) {
      const r = h / 2;
      ctx.fillStyle = fill;
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arc(x + w - r, y + r, r, -Math.PI / 2, Math.PI / 2);
      ctx.lineTo(x + r, y + h);
      ctx.arc(x + r, y + r, r, Math.PI / 2, -Math.PI / 2);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    function pngRoundRect(ctx, x, y, w, h, r, fill, stroke) {
      ctx.fillStyle = fill;
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arc(x + w - r, y + r, r, -Math.PI / 2, 0);
      ctx.lineTo(x + w, y + h - r);
      ctx.arc(x + w - r, y + h - r, r, 0, Math.PI / 2);
      ctx.lineTo(x + r, y + h);
      ctx.arc(x + r, y + h - r, r, Math.PI / 2, Math.PI);
      ctx.lineTo(x, y + r);
      ctx.arc(x + r, y + r, r, Math.PI, -Math.PI / 2);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    function pngDiamond(ctx, x, y, w, h, fill, stroke) {
      const cx = x + w / 2, cy = y + h / 2;
      ctx.fillStyle = fill;
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx, y);
      ctx.lineTo(x + w, cy);
      ctx.lineTo(cx, y + h);
      ctx.lineTo(x, cy);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    function pngNote(ctx, x, y, w, h, fill, stroke) {
      const fold = 14;
      ctx.fillStyle = fill;
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + w - fold, y);
      ctx.lineTo(x + w, y + fold);
      ctx.lineTo(x + w, y + h);
      ctx.lineTo(x, y + h);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = 'rgba(0,0,0,0.07)';
      ctx.beginPath();
      ctx.moveTo(x + w - fold, y);
      ctx.lineTo(x + w, y + fold);
      ctx.lineTo(x + w - fold, y + fold);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + w - fold, y);
      ctx.lineTo(x + w - fold, y + fold);
      ctx.lineTo(x + w, y + fold);
      ctx.stroke();
    }

    function pngDatabase(ctx, x, y, w, h, fill, capFill, stroke) {
      const capRy = 10; // half-height of the ellipse cap
      const bodyTop = y + capRy; // body starts at the center of the top cap
      const bodyH = h - capRy;

      // Body (sides + bottom, no top border)
      ctx.fillStyle = fill;
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 1.5;
      ctx.fillRect(x, bodyTop, w, bodyH);
      ctx.beginPath();
      ctx.moveTo(x, bodyTop);
      ctx.lineTo(x, y + h);
      ctx.lineTo(x + w, y + h);
      ctx.lineTo(x + w, bodyTop);
      ctx.stroke();

      // Bottom arc (depth illusion)
      ctx.beginPath();
      ctx.ellipse(x + w / 2, y + h, w / 2, capRy * 0.5, 0, Math.PI, 0);
      ctx.fillStyle = fill;
      ctx.fill();
      ctx.strokeStyle = stroke;
      ctx.stroke();

      // Top cap ellipse
      ctx.fillStyle = capFill;
      ctx.beginPath();
      ctx.ellipse(x + w / 2, bodyTop, w / 2, capRy, 0, 0, 2 * Math.PI);
      ctx.fill();
      ctx.strokeStyle = stroke;
      ctx.stroke();
    }

    function pngApi(ctx, x, y, w, h, fill, stroke) {
      const headerH = 20;
      // Main body
      pngRoundRect(ctx, x, y, w, h, 4, fill, stroke);
      // Header bar
      ctx.fillStyle = '#ffedd5';
      ctx.beginPath();
      ctx.moveTo(x + 4, y + 1);
      ctx.lineTo(x + w - 4, y + 1);
      ctx.arcTo(x + w - 1, y + 1, x + w - 1, y + 4, 3);
      ctx.lineTo(x + w - 1, y + headerH);
      ctx.lineTo(x + 1, y + headerH);
      ctx.lineTo(x + 1, y + 4);
      ctx.arcTo(x + 1, y + 1, x + 4, y + 1, 3);
      ctx.closePath();
      ctx.fill();
      // Divider line
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, y + headerH);
      ctx.lineTo(x + w, y + headerH);
      ctx.stroke();
      // Header label
      ctx.font = 'bold 8px -apple-system, sans-serif';
      ctx.fillStyle = '#c2410c';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('REQ → RES', x + w / 2, y + headerH / 2);
    }

    function pngQueue(ctx, x, y, w, h, fill, stroke) {
      const sk = h * 0.22;
      ctx.fillStyle = fill;
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x + sk, y);
      ctx.lineTo(x + w, y);
      ctx.lineTo(x + w - sk, y + h);
      ctx.lineTo(x, y + h);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    function pngText(ctx, text, x, y, maxWidth, align) {
      ctx.font = 'bold 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      ctx.fillStyle = '#18181b';
      ctx.textAlign = align;
      ctx.textBaseline = align === 'left' ? 'top' : 'middle';

      const words = String(text).split(' ');
      const lines = [];
      let line = '';
      for (const word of words) {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = word;
        } else {
          line = test;
        }
      }
      if (line) lines.push(line);

      const lh = 15;
      const totalH = lines.length * lh;
      const startY = align === 'left' ? y : y - totalH / 2 + lh / 2;

      lines.forEach((l, i) => ctx.fillText(l, x, startY + i * lh));
    }

    function pngDrawNotes(ctx, notes, x, y, maxWidth, bottomY) {
      if (!notes || !notes.trim()) return y;
      if (maxWidth <= 0) return y;

      ctx.save();
      ctx.font = '10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      ctx.fillStyle = '#52525b';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';

      const lh = 12;
      const maxY = (bottomY != null && isFinite(bottomY)) ? bottomY : Infinity;
      let cy = y;
      let truncated = false;

      const fits = s => ctx.measureText(s).width <= maxWidth;

      const flushLine = text => {
        if (cy + lh > maxY) { truncated = true; return false; }
        ctx.fillText(text, x, cy);
        cy += lh;
        return true;
      };

      // Break a single word into pieces that each fit within (maxWidth - indent).
      const breakLongWord = (word, indent) => {
        const pieces = [];
        let cur = '';
        for (const ch of word) {
          const test = cur + ch;
          if (!fits(indent + test) && cur) {
            pieces.push(cur);
            cur = ch;
          } else {
            cur = test;
          }
        }
        if (cur) pieces.push(cur);
        return pieces.length ? pieces : [word];
      };

      outer:
      for (const raw of notes.split('\n')) {
        if (cy + lh > maxY) { truncated = true; break; }
        const trimmed = raw.trim();
        if (!trimmed) { cy += lh * 0.5; continue; }

        const m = trimmed.match(/^[-*•]\s+(.*)/);
        const isBullet = !!m;
        const body = isBullet ? m[1] : trimmed;
        const prefix = isBullet ? '• ' : '';
        const contIndent = isBullet ? '   ' : '';

        let line = prefix;
        let started = false;

        for (let word of body.split(' ')) {
          if (!word) continue;

          // Try appending normally.
          const candidate = started ? line + ' ' + word : line + word;
          if (fits(candidate)) { line = candidate; started = true; continue; }

          // Doesn't fit — flush current line first.
          if (started) {
            if (!flushLine(line)) break outer;
            line = contIndent;
            started = false;
          }

          // If the word still won't fit on its own line, break it by characters.
          if (!fits(line + word)) {
            const pieces = breakLongWord(word, contIndent);
            for (let i = 0; i < pieces.length - 1; i++) {
              if (!flushLine(line + pieces[i])) break outer;
              line = contIndent;
            }
            line = line + pieces[pieces.length - 1];
            started = true;
          } else {
            line = line + word;
            started = true;
          }
        }

        if (line.trim()) {
          if (!flushLine(line)) break;
        }
      }

      if (truncated && cy > y) {
        // Replace the last drawn line's tail with an ellipsis to signal clipping.
        ctx.fillStyle = 'rgba(249,250,251,0.95)';
        ctx.fillRect(x + maxWidth - 10, cy - lh, 10, lh);
        ctx.fillStyle = '#52525b';
        ctx.fillText('…', x + maxWidth - 8, cy - lh);
      }

      ctx.restore();
      return cy;
    }

    // ── Bootstrap ──────────────────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', init);

  </script>

</body>
