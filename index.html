        const rw = Math.abs(wc.x - state.rubberBand.startX);
        const rh = Math.abs(wc.y - state.rubberBand.startY);

        const el = state.rubberBand.element;
        el.style.left = rx + 'px'; el.style.top = ry + 'px';
        el.style.width = rw + 'px'; el.style.height = rh + 'px';

        for (const node of Object.values(state.nodes)) {
          node.element.classList.toggle('rb-highlight', nodeIntersectsRect(node, rx, ry, rw, rh));
        }
      }

      if (state.connecting.active && state.connecting.tempPath) {
        const wc = toWorldCoords(e.clientX, e.clientY);
        const from = getPortCenter(state.connecting.fromNodeId, state.connecting.fromPort);
        const d = buildBezierPath(from, wc,
          state.connecting.fromPort, oppositePort(state.connecting.fromPort));
        state.connecting.tempPath.setAttribute('d', d);
      }

      if (state.reanchor.active && state.reanchor.tempPath) {
        const wc = toWorldCoords(e.clientX, e.clientY);
        const conn = state.connections[state.reanchor.connId];
        if (conn) {
          let d;
          if (state.reanchor.end === 'to') {
            const from = getPortCenter(conn.fromNodeId, conn.fromPort);
            d = buildBezierPath(from, wc, conn.fromPort, oppositePort(conn.fromPort));
          } else {
            const to = getPortCenter(conn.toNodeId, conn.toPort);
            d = buildBezierPath(wc, to, oppositePort(conn.toPort), conn.toPort);
          }
          state.reanchor.tempPath.setAttribute('d', d);
        }
      }

      if (state.waypointEdit.active) {
        const w = state.waypointEdit;
        const conn = state.connections[w.connId];
        if (conn && conn.waypoints[w.index]) {
          const wc = toWorldCoords(e.clientX, e.clientY);
          conn.waypoints[w.index] = { x: wc.x, y: wc.y };
          if (Math.abs(e.clientX - w.startCX) > 3 || Math.abs(e.clientY - w.startCY) > 3) w.moved = true;
          updateConnection(w.connId);
        }
      }

      if (state.connecting.active || state.dragging.active || state.reanchor.active || state.waypointEdit.active) {
        const { dx, dy } = getEdgePanDeltas(e.clientX, e.clientY);
        if (dx || dy) triggerAutoPan(); else cancelAutoPan();
      }
    }

    // ── Global mouse up ────────────────────────────────────────────────────────

    function onDocumentMouseUp(e) {
      cancelAutoPan();
      clearAlignGuides();
      // End pan
      if (state.panning.active) {
        const didMove = state.panning.didMove;
        state.panning.active = false;
        state.panning.didMove = false;
        canvasContainer.classList.remove('panning');
        if (spaceHeld) canvasContainer.classList.add('space-held');
        // Empty-canvas click (no drag) deselects; an actual pan keeps the selection.
        if (!didMove && !spaceHeld) clearSelection();
        return;
      }

      // End resize
      if (state.resizing.active) {
        state.resizing.active = false;

        if (resizeUndoSnapshot) {
          const snap = resizeUndoSnapshot;
          resizeUndoSnapshot = null;
          const node = state.nodes[snap.nodeId];
          if (node && (node.width !== snap.width || node.height !== snap.height ||
            node.x !== snap.x || node.y !== snap.y)) {
            pushUndo(() => {
              const n = state.nodes[snap.nodeId];
              if (!n) return;
              n.x = snap.x; n.y = snap.y; n.width = snap.width; n.height = snap.height;
              n.element.style.left = snap.x + 'px';
              n.element.style.top = snap.y + 'px';
              n.element.style.width = snap.width + 'px';
              n.element.style.height = snap.height + 'px';
              updateConnectionsForNode(snap.nodeId);
            });
          }
        }
        return;
      }

      // End group resize
      if (state.groupResize.active) {
        const snap = state.groupResize.startNodes;
        state.groupResize.active = false;
        state.groupResize.startNodes = null;
        state.groupResize.startBox = null;

        if (snap) {
          const changed = Object.keys(snap).some(id => {
            const n = state.nodes[id];
            return n && (n.x !== snap[id].x || n.y !== snap[id].y ||
              n.width !== snap[id].width || n.height !== snap[id].height);
          });
          if (changed) {
            pushUndo(() => {
              for (const id of Object.keys(snap)) {
                const n = state.nodes[id];
                if (!n) continue;
                n.x = snap[id].x; n.y = snap[id].y;
                n.width = snap[id].width; n.height = snap[id].height;
                n.element.style.left = n.x + 'px';
                n.element.style.top = n.y + 'px';
                n.element.style.width = n.width + 'px';
                n.element.style.height = n.height + 'px';
                updateConnectionsForNode(id);
              }
              updateGroupResizeBox();
            });
          }
        }
        updateGroupResizeBox();
        return;
      }

      // Palette drop
      if (state.pendingCreate.active) {
        if (state.pendingCreate.ghost) {
          state.pendingCreate.ghost.remove();
          state.pendingCreate.ghost = null;
        }

        const rect = canvasContainer.getBoundingClientRect();
        const inside = e.clientX >= rect.left && e.clientX <= rect.right &&
          e.clientY >= rect.top && e.clientY <= rect.bottom;

        if (inside) {
          const dims = NODE_DIMS[state.pendingCreate.type] || NODE_DIMS.process;
          const wc = toWorldCoords(e.clientX, e.clientY);
          const x = wc.x - dims.width / 2;
          const y = wc.y - dims.height / 2;
          clearSelection();
          const node = createNode(state.pendingCreate.type, Math.max(0, x), Math.max(0, y));
          addToSelection(node.id);

          const nodeId = node.id;
          pushUndo(() => {
            state.selectedNodeIds.delete(nodeId);
            deleteNode(nodeId);
            renumberNodes();
            updatePropsPanel();
          });
        }

        state.pendingCreate.active = false;
        state.pendingCreate.type = null;
        return;
      }

      // End node drag — push undo if anything actually moved
      if (state.dragging.active) {
        state.dragging.active = false;

        if (dragStartPositions) {
          const moved = [];
          for (const [nodeId, start] of Object.entries(dragStartPositions)) {
            const node = state.nodes[nodeId];
            if (node && (node.x !== start.x || node.y !== start.y)) {
              moved.push({ nodeId, start, end: { x: node.x, y: node.y } });
            }
          }
          if (moved.length > 0) {
            const snapshot = moved;
            pushUndo(() => {
              for (const { nodeId, start } of snapshot) {
                const node = state.nodes[nodeId];
                if (!node) continue;
                node.x = start.x; node.y = start.y;
                node.element.style.left = start.x + 'px';
                node.element.style.top = start.y + 'px';
                updateConnectionsForNode(nodeId);
              }
            });
          }
          dragStartPositions = null;
        }
      }

      // Finalize rubber-band
      if (state.rubberBand.active) {
        const wc = toWorldCoords(e.clientX, e.clientY);
        const rx = Math.min(wc.x, state.rubberBand.startX);
        const ry = Math.min(wc.y, state.rubberBand.startY);
        const rw = Math.abs(wc.x - state.rubberBand.startX);
        const rh = Math.abs(wc.y - state.rubberBand.startY);

        for (const node of Object.values(state.nodes)) {
          node.element.classList.remove('rb-highlight');
          if (nodeIntersectsRect(node, rx, ry, rw, rh)) addToSelection(node.id);
        }

        state.rubberBand.element.remove();
        state.rubberBand.element = null;
        state.rubberBand.active = false;
        updatePropsPanel();
        return;
      }

      // Finalize connection
      if (state.connecting.active) {
        const portEl = e.target.closest('.port');
        const toNodeId = portEl ? portEl.dataset.nodeId : null;
        const toPort = portEl ? portEl.dataset.port : null;

        if (toNodeId && toNodeId !== state.connecting.fromNodeId && toPort) {
          // Both ends were chosen by hand (dragged dot → dropped dot), so anchor them.
          createConnection(
            state.connecting.fromNodeId, state.connecting.fromPort,
            toNodeId, toPort, '', { from: true, to: true }
          );
        }

        if (state.connecting.tempPath) {
          state.connecting.tempPath.remove();
          state.connecting.tempPath = null;
        }

        const sourceEl = state.nodes[state.connecting.fromNodeId]?.element;
        if (sourceEl) sourceEl.classList.remove('connecting-source');
        canvasContainer.classList.remove('connecting-active');

        state.connecting.active = false;
        state.connecting.fromNodeId = null;
        state.connecting.fromPort = null;
      }

      // Finalize re-anchor of an existing connection's endpoint
      if (state.reanchor.active) {
        finalizeReanchor(e);
      }

      // Finalize waypoint move/add
      if (state.waypointEdit.active) {
        finalizeWaypointDrag();
      }
    }

    // ── Connecting ─────────────────────────────────────────────────────────────

    function startConnecting(nodeId, port) {
      state.connecting.active = true;
      state.connecting.fromNodeId = nodeId;
      state.connecting.fromPort = port;

      const node = state.nodes[nodeId];
      if (node) node.element.classList.add('connecting-source');
      canvasContainer.classList.add('connecting-active');

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.classList.add('temp-connection');
      canvasSvg.appendChild(path);
      state.connecting.tempPath = path;
    }

    function createConnection(fromNodeId, fromPort, toNodeId, toPort, label = '', anchored = null, waypoints = null) {
      for (const c of Object.values(state.connections)) {
        if (c.fromNodeId === fromNodeId && c.fromPort === fromPort &&
          c.toNodeId === toNodeId && c.toPort === toPort) return;
      }

      const id = 'conn-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
      const hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      hit.classList.add('connection-hit');
      hit.dataset.connId = id;
      canvasSvg.appendChild(hit);

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.classList.add('connection');
      path.setAttribute('marker-end', 'url(#arrowhead)');
      path.dataset.connId = id;
      canvasSvg.appendChild(path);

      hit.addEventListener('mouseenter', () => {
        path.classList.add('hovered');
        if (!path.classList.contains('selected')) {
          path.setAttribute('marker-end', 'url(#arrowhead-selected)');
        }
      });
      hit.addEventListener('mouseleave', () => {
        path.classList.remove('hovered');
        if (!path.classList.contains('selected')) {
          path.setAttribute('marker-end', 'url(#arrowhead)');
        }
      });

      const labelEl = document.createElement('div');
      labelEl.className = 'conn-label';
      labelEl.dataset.connId = id;
      labelEl.addEventListener('mousedown', e => { e.stopPropagation(); });
      labelEl.addEventListener('dblclick', e => { e.stopPropagation(); startConnLabelEdit(id); });
      canvasNodes.appendChild(labelEl);

      const conn = {
        id, fromNodeId, fromPort, toNodeId, toPort, label,
        fromAnchored: !!(anchored && anchored.from),
        toAnchored: !!(anchored && anchored.to),
        waypoints: Array.isArray(waypoints) ? waypoints.map(p => ({ x: p.x, y: p.y })) : [],
        pathElement: path, hitElement: hit, labelElement: labelEl
      };
      state.connections[id] = conn;
      renderConnLabel(conn);
      updateConnection(id);
      updateConnectionsForNode(fromNodeId);
      updateConnectionsForNode(toNodeId);

      pushUndo(() => deleteConnection(id));
    }

    function renderConnLabel(conn) {
      if (!conn.labelElement) return;
      conn.labelElement.textContent = conn.label || '';
      conn.labelElement.classList.toggle('empty', !conn.label);
    }

    function startConnLabelEdit(connId) {
      const conn = state.connections[connId];
      if (!conn || !conn.labelElement) return;
      const oldLabel = conn.label || '';
      const input = document.createElement('textarea');
      input.className = 'conn-label-editor';
      input.value = oldLabel;
      input.placeholder = 'Label…';
      input.rows = 1;

      conn.labelElement.textContent = '';
      conn.labelElement.classList.remove('empty');
      conn.labelElement.appendChild(input);
      const autosize = () => { input.style.height = 'auto'; input.style.height = input.scrollHeight + 'px'; };
      input.focus();
      input.select();
      autosize();

      // A mousedown anywhere outside the editor commits it. This is more robust
      // than relying on blur, since canvas/node handlers preventDefault() the
      // mousedown (which would otherwise suppress the focus shift and the blur).
      function onOutside(ev) {
        if (!conn.labelElement.contains(ev.target)) input.blur();
      }
      document.addEventListener('mousedown', onOutside, true);

      let done = false;
      function commit() {
        if (done) return;
        done = true;
        document.removeEventListener('mousedown', onOutside, true);
        const newLabel = input.value.trim();
        conn.label = newLabel;
        renderConnLabel(conn);
        updateConnection(connId);   // re-centre on the (possibly taller) label
        if (newLabel !== oldLabel) {
          pushUndo(() => {
            const c = state.connections[connId];
            if (!c) return;
            c.label = oldLabel;
            renderConnLabel(c);
            updateConnection(connId);
          });
        }
      }
      input.addEventListener('blur', commit);
      input.addEventListener('input', autosize);
      input.addEventListener('keydown', e => {
        e.stopPropagation();
        // Enter inserts a newline (multi-line); click away or Escape to finish.
        if (e.key === 'Escape') { input.value = oldLabel; input.blur(); }
      });
    }

    // ── Port geometry ──────────────────────────────────────────────────────────

    function getPortCenter(nodeId, port) {
      const n = state.nodes[nodeId];
      const pts = {
        top: { x: n.x + n.width / 2, y: n.y },
        right: { x: n.x + n.width, y: n.y + n.height / 2 },
        bottom: { x: n.x + n.width / 2, y: n.y + n.height },
        left: { x: n.x, y: n.y + n.height / 2 }
      };
      return pts[port];
    }

    function oppositePort(port) {
      return { top: 'bottom', bottom: 'top', left: 'right', right: 'left' }[port];
    }

    // Choose the closest pair of ports. A fixed port (when that end is anchored)
    // constrains its side of the search so only the free end is auto-picked.
    function pickBestPorts(fromNodeId, toNodeId, fixedFrom = null, fixedTo = null) {
      const ports = ['top', 'right', 'bottom', 'left'];
      const fromPorts = fixedFrom ? [fixedFrom] : ports;
      const toPorts = fixedTo ? [fixedTo] : ports;
      let best = null, minDist = Infinity;
      for (const fp of fromPorts) {
        for (const tp of toPorts) {
          const f = getPortCenter(fromNodeId, fp);
          const t = getPortCenter(toNodeId, tp);
          const d = Math.hypot(t.x - f.x, t.y - f.y);
          if (d < minDist) { minDist = d; best = { fromPort: fp, toPort: tp }; }
        }
      }
      return best;
    }

    // ── Connect Mode ────────────────────────────────────────────────────────────

    function activateConnectSource(nodeId) {
      clearConnectSource();
      state.connectMode.fromNodeId = nodeId;
      state.nodes[nodeId]?.element.classList.add('connect-source');
      canvasContainer.classList.add('connect-mode');
    }

    function clearConnectSource() {
      if (state.connectMode.fromNodeId) {
        state.nodes[state.connectMode.fromNodeId]?.element.classList.remove('connect-source');
        state.connectMode.fromNodeId = null;
      }
      canvasContainer.classList.remove('connect-mode');
    }

    // ── Bezier paths ───────────────────────────────────────────────────────────

    function buildBezierPath(from, to, fromPort, toPort, fanInfo = null, opts = null) {
      const tp = toPort || oppositePort(fromPort);

      // Perpendicular offset so multiple connections sharing a port don't overlap.
      const perp = {
        top: { x: 1, y: 0 },
        bottom: { x: 1, y: 0 },
        left: { x: 0, y: 1 },
        right: { x: 0, y: 1 }
      };
      const SPACING = 10;
      let fromOff = 0, toOff = 0;
      if (fanInfo) {
        const { fromIndex, fromCount, toIndex, toCount } = fanInfo;
        fromOff = (fromIndex - (fromCount - 1) / 2) * SPACING;
        toOff = (toIndex - (toCount - 1) / 2) * SPACING;
      }
      const fStart = {
        x: from.x + perp[fromPort].x * fromOff,
        y: from.y + perp[fromPort].y * fromOff
      };
      const tEnd = {
        x: to.x + perp[tp].x * toOff,
        y: to.y + perp[tp].y * toOff
      };

      const standard = composeBezier(fStart, tEnd, fromPort, tp, 0, 0);

      // No-obstacle path (used for temp drag and as fallback)
      const obstacles = opts && opts.obstacles;
      if (!obstacles || obstacles.length === 0) return standard;
      if (!pathHitsObstacles(standard, obstacles)) return standard;

      // Try perpendicular bow detours, alternating sides, increasing magnitude.
      const mags = [60, 120, 200, 300, 420, 560];
      for (const mag of mags) {
        for (const side of [1, -1]) {
          const detour = composeBezier(fStart, tEnd, fromPort, tp, side, mag);
          if (!pathHitsObstacles(detour, obstacles)) return detour;
        }
      }
      return standard;
    }

    function composeBezier(fStart, tEnd, fromPort, tp, bowSide, bowMag) {
      const dx = Math.abs(tEnd.x - fStart.x);
      const dy = Math.abs(tEnd.y - fStart.y);
      const offset = Math.max(60, (dx + dy) * 0.3);

      const portVec = {
        top: { cx: 0, cy: -offset },
        right: { cx: offset, cy: 0 },
        bottom: { cx: 0, cy: offset },
        left: { cx: -offset, cy: 0 }
      };

      let c1 = { x: fStart.x + portVec[fromPort].cx, y: fStart.y + portVec[fromPort].cy };
      let c2 = { x: tEnd.x + portVec[tp].cx, y: tEnd.y + portVec[tp].cy };

      if (bowMag) {
        const vx = tEnd.x - fStart.x;
        const vy = tEnd.y - fStart.y;
        const len = Math.hypot(vx, vy) || 1;
        // perpendicular unit (rotated +90deg)
        const px = -vy / len;
        const py = vx / len;
        const bx = px * bowSide * bowMag;
        const by = py * bowSide * bowMag;
        c1 = { x: c1.x + bx, y: c1.y + by };
        c2 = { x: c2.x + bx, y: c2.y + by };
      }

      return `M ${fStart.x} ${fStart.y} C ${c1.x} ${c1.y}, ${c2.x} ${c2.y}, ${tEnd.x} ${tEnd.y}`;
    }

    let __collisionProbePath = null;
    function getCollisionProbe() {
      if (!__collisionProbePath || !__collisionProbePath.isConnected) {
        const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        p.setAttribute('fill', 'none');
        p.style.visibility = 'hidden';
        p.style.pointerEvents = 'none';
        canvasSvg.appendChild(p);
        __collisionProbePath = p;
      }
      return __collisionProbePath;
    }

    function pathHitsObstacles(d, obstacles, padding = 6) {
      const probe = getCollisionProbe();
      probe.setAttribute('d', d);
      let totalLen = 0;
      try { totalLen = probe.getTotalLength(); } catch (_) { return false; }
      if (!totalLen) return false;
      const step = 6;
      const N = Math.max(20, Math.ceil(totalLen / step));
      // Skip first/last samples so we don't trip on the source/target port radii.
      const skip = 2;
      for (let i = skip; i <= N - skip; i++) {
        const t = i / N;
        const p = probe.getPointAtLength(t * totalLen);
        for (const n of obstacles) {
          if (p.x >= n.x - padding && p.x <= n.x + n.width + padding &&
            p.y >= n.y - padding && p.y <= n.y + n.height + padding) {
            return true;
          }
        }
      }
      return false;
    }

    function fanInfoForConnection(connId) {
      const conn = state.connections[connId];
      if (!conn) return null;
      const fromSiblings = Object.values(state.connections)
        .filter(c => c.fromNodeId === conn.fromNodeId && c.fromPort === conn.fromPort)
        .map(c => c.id).sort();
      const toSiblings = Object.values(state.connections)
        .filter(c => c.toNodeId === conn.toNodeId && c.toPort === conn.toPort)
        .map(c => c.id).sort();
      return {
        fromIndex: fromSiblings.indexOf(connId),
        fromCount: fromSiblings.length,
        toIndex: toSiblings.indexOf(connId),
        toCount: toSiblings.length
      };
    }

    // ── Update connections ─────────────────────────────────────────────────────

    function updateConnection(connId) {
      const conn = state.connections[connId];
      if (!conn) return;
      const wps = conn.waypoints || [];
      let d;

      if (wps.length) {
        // Waypoint mode: straight segments. Each end attaches to its node's
        // border pointing toward the nearest waypoint (not a fixed side).
        const start = nodeBorderToward(conn.fromNodeId, wps[0]);
        const end = nodeBorderToward(conn.toNodeId, wps[wps.length - 1]);
        conn.renderStart = start;
        conn.renderEnd = end;
        const pts = [start, ...wps, end];
        d = 'M ' + pts.map(p => `${p.x} ${p.y}`).join(' L ');
      } else {
        // Default mode: smooth bezier between cardinal ports.
        // Anchored ends keep their hand-picked port; only free ends auto-route.
        const best = pickBestPorts(
          conn.fromNodeId, conn.toNodeId,
          conn.fromAnchored ? conn.fromPort : null,
          conn.toAnchored ? conn.toPort : null
        );
        if (best) { conn.fromPort = best.fromPort; conn.toPort = best.toPort; }
        const from = getPortCenter(conn.fromNodeId, conn.fromPort);
        const to = getPortCenter(conn.toNodeId, conn.toPort);
        conn.renderStart = from;
        conn.renderEnd = to;
        const fanInfo = fanInfoForConnection(connId);
        const obstacles = obstacleNodesFor(conn.fromNodeId, conn.toNodeId);
        d = buildBezierPath(from, to, conn.fromPort, conn.toPort, fanInfo, { obstacles });
      }

      conn.pathElement.setAttribute('d', d);
      if (conn.hitElement) conn.hitElement.setAttribute('d', d);

      if (conn.labelElement) {
        const mid = pathMidpointFromD(d);
        if (mid) {
          conn.labelElement.style.left = mid.x + 'px';
          conn.labelElement.style.top = mid.y + 'px';
        }
      }

      if (connId === state.selectedConnId) positionConnEndpoints(conn);
    }

    // Point on a node's border along the ray from its center toward `target`.
    function nodeBorderToward(nodeId, target) {
      const n = state.nodes[nodeId];
      if (!n) return { x: target.x, y: target.y };
      const cx = n.x + n.width / 2, cy = n.y + n.height / 2;
      const dx = target.x - cx, dy = target.y - cy;
      if (dx === 0 && dy === 0) return { x: cx, y: cy };
      const hw = n.width / 2, hh = n.height / 2;
      const scale = 1 / Math.max(Math.abs(dx) / hw, Math.abs(dy) / hh);
      return { x: cx + dx * scale, y: cy + dy * scale };
    }

    // [start, ...waypoints, end] in world coords, using last-rendered endpoints.
    function connGeometryPoints(conn) {
      const start = conn.renderStart || getPortCenter(conn.fromNodeId, conn.fromPort);
      const end = conn.renderEnd || getPortCenter(conn.toNodeId, conn.toPort);
      return [start, ...(conn.waypoints || []), end];
    }

    function obstacleNodesFor(fromNodeId, toNodeId) {
      const out = [];
      for (const n of Object.values(state.nodes)) {
        if (n.id === fromNodeId || n.id === toNodeId) continue;
        out.push(n);
      }
      return out;
    }

    function pathMidpointFromD(d) {
      const probe = getCollisionProbe();
      probe.setAttribute('d', d);
      try {
        const len = probe.getTotalLength();
        if (!len) return null;
        return probe.getPointAtLength(len / 2);
      } catch (_) { return null; }
    }

    function bezierMidpoint(from, to, fromPort, toPort, fanInfo) {
      const tp = toPort || oppositePort(fromPort);
      const perp = {
        top: { x: 1, y: 0 }, bottom: { x: 1, y: 0 },
        left: { x: 0, y: 1 }, right: { x: 0, y: 1 }
      };
      const SPACING = 10;
      let fromOff = 0, toOff = 0;
      if (fanInfo) {
        fromOff = (fanInfo.fromIndex - (fanInfo.fromCount - 1) / 2) * SPACING;
        toOff = (fanInfo.toIndex - (fanInfo.toCount - 1) / 2) * SPACING;
      }
      const fStart = { x: from.x + perp[fromPort].x * fromOff, y: from.y + perp[fromPort].y * fromOff };
      const tEnd = { x: to.x + perp[tp].x * toOff, y: to.y + perp[tp].y * toOff };

      const dx = Math.abs(tEnd.x - fStart.x);
      const dy = Math.abs(tEnd.y - fStart.y);
      const offset = Math.max(60, (dx + dy) * 0.3);
      const pv = {
        top: { cx: 0, cy: -offset },
        right: { cx: offset, cy: 0 },
        bottom: { cx: 0, cy: offset },
        left: { cx: -offset, cy: 0 }
      };
      const c1 = { x: fStart.x + pv[fromPort].cx, y: fStart.y + pv[fromPort].cy };
      const c2 = { x: tEnd.x + pv[tp].cx, y: tEnd.y + pv[tp].cy };
      const t = 0.5;
      const mt = 1 - t;
      return {
        x: mt * mt * mt * fStart.x + 3 * mt * mt * t * c1.x + 3 * mt * t * t * c2.x + t * t * t * tEnd.x,
        y: mt * mt * mt * fStart.y + 3 * mt * mt * t * c1.y + 3 * mt * t * t * c2.y + t * t * t * tEnd.y
      };
    }

    function updateConnectionsForNode(nodeId) {
      const movedNode = state.nodes[nodeId];
      for (const conn of Object.values(state.connections)) {
        if (conn.fromNodeId === nodeId || conn.toNodeId === nodeId) {
          updateConnection(conn.id);
          continue;
        }
        // A non-endpoint connection may need re-routing if the moved node now
        // intersects its current path (or it could relax now that the node has moved away).
        if (movedNode && connectionMayBeAffectedBy(conn, movedNode)) {
          updateConnection(conn.id);
        }
      }
    }

    function connectionMayBeAffectedBy(conn, node) {
      const path = conn.pathElement;
      if (!path) return false;
      let bb;
      try { bb = path.getBBox(); } catch (_) { return true; }
      const pad = 40;
      return !(node.x > bb.x + bb.width + pad ||
        node.x + node.width < bb.x - pad ||
        node.y > bb.y + bb.height + pad ||
        node.y + node.height < bb.y - pad);
    }

    // ── Selection ──────────────────────────────────────────────────────────────

    function addToSelection(nodeId) {
      const node = state.nodes[nodeId];
      if (!node) return;
      state.selectedNodeIds.add(nodeId);
      node.element.classList.add('selected');
      updatePropsPanel();
      updateGroupResizeBox();
      refreshConnectedHighlight();
    }

    function refreshConnectedHighlight() {
      for (const n of Object.values(state.nodes)) {
        n.element.classList.remove('connected-highlight', 'dimmed');
      }
      for (const c of Object.values(state.connections)) {
        c.pathElement.classList.remove('connected-highlight', 'dimmed');
      }
      if (state.selectedNodeIds.size === 0) return;

      const reachable = new Set(state.selectedNodeIds);
      const edgeIds = new Set();

      // Upstream BFS: only follow incoming edges (parents, grandparents, …).
      const upQueue = [...state.selectedNodeIds];
      while (upQueue.length) {
        const id = upQueue.shift();
        for (const c of Object.values(state.connections)) {
          if (c.toNodeId !== id) continue;
          edgeIds.add(c.id);
          const other = c.fromNodeId;
          if (!reachable.has(other)) {
            reachable.add(other);
            upQueue.push(other);
          }
        }
      }

      // Downstream BFS: only follow outgoing edges (children, grandchildren, …).
      const downQueue = [...state.selectedNodeIds];
      while (downQueue.length) {
        const id = downQueue.shift();
        for (const c of Object.values(state.connections)) {
          if (c.fromNodeId !== id) continue;
          edgeIds.add(c.id);
          const other = c.toNodeId;
          if (!reachable.has(other)) {
            reachable.add(other);
            downQueue.push(other);
          }
        }
      }

      if (edgeIds.size === 0) return;

      for (const id of reachable) {
        if (state.selectedNodeIds.has(id)) continue;
        const n = state.nodes[id];
        if (n) n.element.classList.add('connected-highlight');
      }
      for (const eid of edgeIds) {
        const c = state.connections[eid];
        if (c) c.pathElement.classList.add('connected-highlight');
      }

      for (const [id, n] of Object.entries(state.nodes)) {
        if (!reachable.has(id)) n.element.classList.add('dimmed');
      }
      for (const c of Object.values(state.connections)) {
        if (!edgeIds.has(c.id)) c.pathElement.classList.add('dimmed');
      }
    }

    function toggleNodeInSelection(nodeId) {
      if (state.selectedNodeIds.has(nodeId)) {
        state.selectedNodeIds.delete(nodeId);
        const node = state.nodes[nodeId];
        if (node) node.element.classList.remove('selected');
      } else {
        addToSelection(nodeId);
      }
      updatePropsPanel();
      updateGroupResizeBox();
      refreshConnectedHighlight();
    }

    function selectConnection(connId) {
      clearSelection();
      state.selectedConnId = connId;
      const conn = state.connections[connId];
      if (!conn) return;
      conn.pathElement.classList.add('selected');
      conn.pathElement.setAttribute('marker-end', 'url(#arrowhead-selected)');
      showConnEndpoints(conn);
    }

    // ── Connection endpoint handles (re-anchoring) ───────────────────────────────

    function showConnEndpoints(conn) {
      hideConnEndpoints();
      connEndpointEls = {};
      for (const end of ['from', 'to']) {
        const dot = document.createElement('div');
        dot.className = 'conn-endpoint';
        dot.dataset.end = end;
        dot.title = 'Drag onto a node to re-anchor this end';
        dot.addEventListener('mousedown', e => startReanchor(e, end));
        canvasNodes.appendChild(dot);
        connEndpointEls[end] = dot;
      }

      // One draggable dot per existing waypoint (double-click to delete).
      connWaypointEls = (conn.waypoints || []).map((wp, i) => {
        const dot = document.createElement('div');
        dot.className = 'conn-endpoint conn-waypoint';
        dot.title = 'Drag to move · double-click to remove';
        dot.addEventListener('mousedown', e => startWaypointDrag(e, i, false));
        dot.addEventListener('dblclick', e => { e.preventDefault(); e.stopPropagation(); removeWaypoint(conn.id, i); });
        canvasNodes.appendChild(dot);
        return dot;
      });

      // One hollow "add" dot at each segment midpoint (drag out to bend the line).
      const segCount = connGeometryPoints(conn).length - 1;
      connAdderEls = [];
      for (let i = 0; i < segCount; i++) {
        const dot = document.createElement('div');
        dot.className = 'conn-adder';
        dot.title = 'Drag to add a bend point';
        dot.addEventListener('mousedown', e => startWaypointDrag(e, i, true));
        canvasNodes.appendChild(dot);
        connAdderEls.push(dot);
      }

      positionConnEndpoints(conn);
    }

    function hideConnEndpoints() {
      if (connEndpointEls) {
        connEndpointEls.from?.remove();
        connEndpointEls.to?.remove();
        connEndpointEls = null;
      }
      connWaypointEls.forEach(el => el.remove());
      connWaypointEls = [];
      connAdderEls.forEach(el => el.remove());
      connAdderEls = [];
    }

    function setHandlePos(el, p) {
      if (el && p) { el.style.left = p.x + 'px'; el.style.top = p.y + 'px'; }
    }

    function positionConnEndpoints(conn) {
      if (!conn) return;
      const pts = connGeometryPoints(conn);
      if (connEndpointEls) {
        setHandlePos(connEndpointEls.from, pts[0]);
        setHandlePos(connEndpointEls.to, pts[pts.length - 1]);
      }
      const wps = conn.waypoints || [];
      for (let i = 0; i < connWaypointEls.length; i++) setHandlePos(connWaypointEls[i], wps[i]);
      for (let i = 0; i < connAdderEls.length; i++) {
        const a = pts[i], b = pts[i + 1];
        if (a && b) setHandlePos(connAdderEls[i], { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });
      }
    }

    // ── Waypoints (bend points) ──────────────────────────────────────────────────

    function startWaypointDrag(e, index, isNew) {
      e.preventDefault();
      e.stopPropagation();
      const connId = state.selectedConnId;
      const conn = state.connections[connId];
      if (!conn) return;
      conn.waypoints = conn.waypoints || [];

      const wc = toWorldCoords(e.clientX, e.clientY);
      const beforeWps = conn.waypoints.map(p => ({ x: p.x, y: p.y }));
      if (isNew) conn.waypoints.splice(index, 0, { x: wc.x, y: wc.y });

      state.waypointEdit = {
        active: true, connId, index, isNew, beforeWps,
        startCX: e.clientX, startCY: e.clientY, moved: false
      };

      updateConnection(connId);
      // Only a new point changes the handle count; rebuild then. Rebuilding on an
      // existing-point press would swap the dot element and suppress its dblclick.
      if (isNew) showConnEndpoints(conn);
    }

    function removeWaypoint(connId, index) {
      const conn = state.connections[connId];
      if (!conn || !conn.waypoints) return;
      const beforeWps = conn.waypoints.map(p => ({ x: p.x, y: p.y }));
      conn.waypoints.splice(index, 1);
      updateConnection(connId);
      if (connId === state.selectedConnId) showConnEndpoints(conn);
      pushUndo(() => {
        const c = state.connections[connId];
        if (!c) return;
        c.waypoints = beforeWps.map(p => ({ x: p.x, y: p.y }));
        updateConnection(connId);
        if (connId === state.selectedConnId) showConnEndpoints(c);
      });
    }

    function finalizeWaypointDrag() {
      const w = state.waypointEdit;
      state.waypointEdit = { active: false };
      const conn = state.connections[w.connId];
      if (!conn) return;

      // A click that barely moved on an "add" handle shouldn't litter the path.
      if (w.isNew && !w.moved) {
        conn.waypoints.splice(w.index, 1);
        updateConnection(w.connId);
        if (w.connId === state.selectedConnId) showConnEndpoints(conn);
        return;
      }
      // An existing point that wasn't actually moved: nothing changed, no undo step.
      if (!w.moved) return;

      const beforeWps = w.beforeWps;
      pushUndo(() => {
        const c = state.connections[w.connId];
        if (!c) return;
        c.waypoints = beforeWps.map(p => ({ x: p.x, y: p.y }));
        updateConnection(w.connId);
        if (w.connId === state.selectedConnId) showConnEndpoints(c);
      });
    }

    function startReanchor(e, end) {
      e.preventDefault();
      e.stopPropagation();
      const connId = state.selectedConnId;
      const conn = state.connections[connId];
      if (!conn) return;

      state.reanchor.active = true;
      state.reanchor.connId = connId;
      state.reanchor.end = end;
      state.reanchor.before = {
        nodeId: end === 'from' ? conn.fromNodeId : conn.toNodeId,
        port: end === 'from' ? conn.fromPort : conn.toPort,
        anchored: end === 'from' ? conn.fromAnchored : conn.toAnchored
      };

      connEndpointEls?.[end]?.classList.add('dragging');
      canvasContainer.classList.add('connecting-active');

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.classList.add('temp-connection');
      canvasSvg.appendChild(path);
      state.reanchor.tempPath = path;
    }

    function finalizeReanchor(e) {
      const conn = state.connections[state.reanchor.connId];
      const end = state.reanchor.end;
      const before = state.reanchor.before;

      if (state.reanchor.tempPath) { state.reanchor.tempPath.remove(); state.reanchor.tempPath = null; }
      connEndpointEls?.[end]?.classList.remove('dragging');
      canvasContainer.classList.remove('connecting-active');
      state.reanchor.active = false;

      if (!conn) { state.reanchor.connId = null; state.reanchor.end = null; state.reanchor.before = null; return; }

      // Resolve the drop target: a dot anchors to an exact port; a node body
      // retargets that end (and lets it auto-route); anywhere else cancels.
      const portEl = e.target.closest('.port');
      const nodeEl = e.target.closest('.node');
      let newNodeId = null, newPort = null, anchored = false;
      if (portEl) {
        newNodeId = portEl.dataset.nodeId;
        newPort = portEl.dataset.port;
        anchored = true;
      } else if (nodeEl) {
        newNodeId = nodeEl.dataset.nodeId;
        anchored = false;
      }

      const otherNodeId = end === 'from' ? conn.toNodeId : conn.fromNodeId;
      const changed = newNodeId &&
        newNodeId !== otherNodeId &&
        !(newNodeId === before.nodeId && newPort === before.port && anchored === before.anchored);

      if (changed) {
        const oldNodeId = before.nodeId;
        const connId = conn.id;
        applyReanchor(conn, end, newNodeId, newPort, anchored);
        pushUndo(() => {
          const c = state.connections[connId];
          if (!c) return;
          applyReanchor(c, end, before.nodeId, before.anchored ? before.port : null, before.anchored);
          updateConnectionsForNode(before.nodeId);
          updateConnectionsForNode(newNodeId);
        });
        updateConnectionsForNode(oldNodeId);
        updateConnectionsForNode(newNodeId);
      }

      state.reanchor.connId = null;
      state.reanchor.end = null;
      state.reanchor.before = null;
    }

    function applyReanchor(conn, end, nodeId, port, anchored) {
      if (end === 'from') {
        conn.fromNodeId = nodeId;
        conn.fromAnchored = anchored;
        if (port) conn.fromPort = port;
      } else {
        conn.toNodeId = nodeId;
        conn.toAnchored = anchored;
        if (port) conn.toPort = port;
      }
      updateConnection(conn.id);
    }

    function clearSelection() {
      for (const nodeId of state.selectedNodeIds) {
        const node = state.nodes[nodeId];
        if (node) node.element.classList.remove('selected');
      }
      state.selectedNodeIds.clear();

      if (state.selectedConnId) {
        const conn = state.connections[state.selectedConnId];
        if (conn) {
          conn.pathElement.classList.remove('selected');
          conn.pathElement.setAttribute('marker-end', 'url(#arrowhead)');
        }
        state.selectedConnId = null;
      }
      hideConnEndpoints();

      updatePropsPanel();
      updateGroupResizeBox();
      refreshConnectedHighlight();
    }

    function updateGroupResizeBox() {
      if (state.groupResize.active) return;
      if (state.groupBoxEl) { state.groupBoxEl.remove(); state.groupBoxEl = null; }
      if (state.selectedNodeIds.size < 2) return;

      const bb = getSelectionBBox();
      if (!bb) return;

      const box = document.createElement('div');
      box.className = 'group-resize-box';
      box.style.left = bb.x + 'px';
      box.style.top = bb.y + 'px';
      box.style.width = bb.w + 'px';
      box.style.height = bb.h + 'px';

      ['tl', 'tc', 'tr', 'rc', 'br', 'bc', 'bl', 'lc'].forEach(h => {
        const rh = document.createElement('div');
        rh.className = 'resize-handle';
        rh.dataset.handle = h;
        rh.style.pointerEvents = 'all';
        rh.addEventListener('mousedown', e => onGroupHandleDown(e, h));
        box.appendChild(rh);
      });

      canvasNodes.appendChild(box);
      state.groupBoxEl = box;
    }

    function getSelectionBBox() {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity, count = 0;
      for (const id of state.selectedNodeIds) {
        const n = state.nodes[id];
        if (!n) continue;
        if (n.x < minX) minX = n.x;
        if (n.y < minY) minY = n.y;
        if (n.x + n.width > maxX) maxX = n.x + n.width;
        if (n.y + n.height > maxY) maxY = n.y + n.height;
        count++;
      }
      if (!count) return null;
      return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
    }

    function onGroupHandleDown(e, handle) {
      e.preventDefault();
      e.stopPropagation();
      const wc = toWorldCoords(e.clientX, e.clientY);
      const startBox = getSelectionBBox();
      if (!startBox) return;

      const startNodes = {};
      for (const id of state.selectedNodeIds) {
        const n = state.nodes[id];
        if (!n) continue;
        startNodes[id] = { x: n.x, y: n.y, width: n.width, height: n.height };
      }

      state.groupResize.active = true;
      state.groupResize.handle = handle;
      state.groupResize.startMouseX = wc.x;
      state.groupResize.startMouseY = wc.y;
      state.groupResize.startBox = startBox;
      state.groupResize.startNodes = startNodes;
    }

    function applyGroupResize(curX, curY) {
      const { handle, startMouseX, startMouseY, startBox, startNodes } = state.groupResize;
      const MIN = 20;

      let nx = startBox.x, ny = startBox.y, nw = startBox.w, nh = startBox.h;
      const dx = curX - startMouseX;
      const dy = curY - startMouseY;

      if (handle.includes('r')) nw = Math.max(MIN, startBox.w + dx);
      if (handle.includes('b')) nh = Math.max(MIN, startBox.h + dy);
      if (handle.includes('l')) { nw = Math.max(MIN, startBox.w - dx); nx = startBox.x + startBox.w - nw; }
      if (handle.includes('t')) { nh = Math.max(MIN, startBox.h - dy); ny = startBox.y + startBox.h - nh; }

      const sx = nw / startBox.w;
      const sy = nh / startBox.h;

      for (const id of Object.keys(startNodes)) {
        const s = startNodes[id];
        const node = state.nodes[id];
        if (!node) continue;
        const relX = (s.x - startBox.x) * sx;
        const relY = (s.y - startBox.y) * sy;
        const newW = Math.max(getContentMinDims(node).w, s.width * sx);
        node.x = nx + relX;
        node.y = ny + relY;
        node.width = newW;
        node.element.style.left = node.x + 'px';
        node.element.style.top = node.y + 'px';
        node.element.style.width = node.width + 'px';
        autoResizeNode(node);
        updateConnectionsForNode(id);
      }

      if (state.groupBoxEl) {
        state.groupBoxEl.style.left = nx + 'px';
        state.groupBoxEl.style.top = ny + 'px';
        state.groupBoxEl.style.width = nw + 'px';
        state.groupBoxEl.style.height = nh + 'px';
      }
    }

    function updateSoleSelected() {
      for (const node of Object.values(state.nodes)) {
        node.element.classList.remove('sole-selected');
      }
      if (state.selectedNodeIds.size === 1) {
        const nodeId = [...state.selectedNodeIds][0];
        const node = state.nodes[nodeId];
        if (node) node.element.classList.add('sole-selected');
      }
    }

    function updatePropsPanel() {
      const count = state.selectedNodeIds.size;

      if (count === 0) {
        propsForm.classList.remove('visible');
        propsEmpty.style.display = '';
        propsEmpty.textContent = 'Select a component to edit its properties.';
      } else if (count === 1) {
        const nodeId = [...state.selectedNodeIds][0];
        const node = state.nodes[nodeId];
        if (!node) return;
        propsEmpty.style.display = 'none';
        propsForm.classList.add('visible');
        propsNodeType.textContent = node.type.charAt(0).toUpperCase() + node.type.slice(1);
        propSeq.value = node.seq || '';
        propLabel.value = node.label;
        propNotes.value = node.notes;
        propTeam.value = node.responseTeam;
        const propLocked = document.getElementById('prop-locked');
        if (propLocked) propLocked.checked = !!node.locked;
        const propColor = document.getElementById('prop-color');
        if (propColor) propColor.value = node.customColor || '#ffffff';
        const dbSection = document.getElementById('props-db-section');
        if (node.type === 'database') {
          dbSection.classList.add('visible');
          propDbServer.value = node.dbServer || '';
        } else {
          dbSection.classList.remove('visible');
        }
        const apiSection = document.getElementById('props-api-section');
        if (node.type === 'api') {
          apiSection.classList.add('visible');
          propApiUrl.value = node.apiUrl || '';
          propApiRequest.value = node.apiRequest || '';
          propApiResponse.value = node.apiResponse || '';
        } else {
          apiSection.classList.remove('visible');
        }
        renderLinkRows();
      } else {
        propsForm.classList.remove('visible');
        propsEmpty.style.display = '';
        propsEmpty.textContent = `${count} components selected. Drag to move all, or press Delete to remove.`;
      }

      updateSoleSelected();
    }

    // ── Properties panel ───────────────────────────────────────────────────────

    let propUndoSnapshot = null;

    function onPropFocus() {
      if (state.selectedNodeIds.size !== 1) return;
      const nodeId = [...state.selectedNodeIds][0];
      const node = state.nodes[nodeId];
      if (!node) return;
      propUndoSnapshot = {
        nodeId,
        seq: node.seq,
        label: node.label,
        notes: node.notes,
        responseTeam: node.responseTeam,
        links: JSON.parse(JSON.stringify(node.links || [])),
        dbServer: node.dbServer || '',
        apiUrl: node.apiUrl || '',
        apiRequest: node.apiRequest || '',
        apiResponse: node.apiResponse || '',
      };
    }

    function onPropBlur() {
      if (!propUndoSnapshot) return;
      const snap = propUndoSnapshot;
      propUndoSnapshot = null;
      const node = state.nodes[snap.nodeId];
      if (!node) return;

      const changed = node.seq !== snap.seq ||
        node.label !== snap.label ||
        node.notes !== snap.notes ||
        node.responseTeam !== snap.responseTeam ||
        node.dbServer !== snap.dbServer ||
        node.apiUrl !== snap.apiUrl ||
        node.apiRequest !== snap.apiRequest ||
        node.apiResponse !== snap.apiResponse ||
        JSON.stringify(node.links) !== JSON.stringify(snap.links);
      if (!changed) return;

      const { seq, label, notes, responseTeam, links, dbServer, apiUrl, apiRequest, apiResponse, nodeId } = snap;
      pushUndo(() => {
        const n = state.nodes[nodeId];
        if (!n) return;
        n.seq = seq; n.label = label; n.notes = notes; n.responseTeam = responseTeam;
        n.links = JSON.parse(JSON.stringify(links));
        n.dbServer = dbServer;
        n.apiUrl = apiUrl; n.apiRequest = apiRequest; n.apiResponse = apiResponse;
        n.element.querySelector('.node-seq').textContent = seq || '';
        setNodeLabelText(n.element, label);
        setNodeDesc(n.element, notes);
        renderNodeLinks(n.element, n.links);
        if (n.type === 'database') setDbServer(n.element, n.dbServer);
        if (n.type === 'api') { setApiUrl(n.element, n.apiUrl); setApiSections(n.element, n.apiRequest, n.apiResponse); }
        autoResizeNode(n);
        if (state.selectedNodeIds.has(nodeId)) { updatePropsPanel(); renderLinkRows(); }
      });
    }

    function onPropsInput(field, value) {
      if (state.selectedNodeIds.size !== 1) return;
      const nodeId = [...state.selectedNodeIds][0];
      const node = state.nodes[nodeId];
      if (!node) return;
      if (field === 'seq') {
        const target = parseInt(value);
        if (!(target > 0)) return;

        const others = Object.values(state.nodes)
          .filter(n => n.id !== node.id)
          .sort((a, b) => (a.seq || 0) - (b.seq || 0));

        const insertAt = Math.min(Math.max(target, 1), others.length + 1) - 1;
        const ordered = others.slice();
        ordered.splice(insertAt, 0, node);

        ordered.forEach((n, i) => {
          const newSeq = i + 1;
          if (n.seq !== newSeq) {
            n.seq = newSeq;
            const seqEl = n.element.querySelector('.node-seq');
            if (seqEl) seqEl.textContent = newSeq;
          }
        });
        state.seqCounter = ordered.length;
        return;
      }
      node[field] = value;
      if (field === 'label') {
        setNodeLabelText(node.element, value);
      }
      if (field === 'notes') {
        setNodeDesc(node.element, value);
      }
      if (field === 'dbServer') {
        setDbServer(node.element, value);
      }
      if (field === 'apiUrl') {
        setApiUrl(node.element, value);
      }
      if (field === 'apiRequest' || field === 'apiResponse') {
        setApiSections(node.element, node.apiRequest, node.apiResponse);
      }
      autoResizeNode(node);
    }

    // ── Links panel ────────────────────────────────────────────────────────────

    function renderLinkRows() {
      const list = document.getElementById('props-links-list');
      if (!list) return;
      list.innerHTML = '';
      if (state.selectedNodeIds.size !== 1) return;
      const node = state.nodes[[...state.selectedNodeIds][0]];
      if (!node) return;

      (node.links || []).forEach((link, i) => {
        const row = document.createElement('div');
        row.className = 'link-row';

        const nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.className = 'link-name';
        nameInput.placeholder = 'Label';
        nameInput.value = link.name || '';
        nameInput.addEventListener('focus', onPropFocus);
        nameInput.addEventListener('blur', onPropBlur);
        nameInput.addEventListener('input', () => {
          node.links[i].name = nameInput.value;
          renderNodeLinks(node.element, node.links);
        });

        const urlInput = document.createElement('input');
        urlInput.type = 'text';
        urlInput.placeholder = 'https://…';
        urlInput.value = link.url || '';
        urlInput.addEventListener('focus', onPropFocus);
        urlInput.addEventListener('blur', onPropBlur);
        urlInput.addEventListener('input', () => {
          node.links[i].url = urlInput.value;
          renderNodeLinks(node.element, node.links);
          autoResizeNode(node);
        });

        const delBtn = document.createElement('button');
        delBtn.className = 'link-del-btn';
        delBtn.textContent = '×';
        delBtn.title = 'Remove link';
        delBtn.addEventListener('mousedown', e => e.preventDefault());
        delBtn.addEventListener('click', () => {
          const snapLinks = JSON.parse(JSON.stringify(node.links));
          node.links.splice(i, 1);
          renderNodeLinks(node.element, node.links);
          autoResizeNode(node);
          renderLinkRows();
          pushUndo(() => {
            node.links = JSON.parse(JSON.stringify(snapLinks));
            renderNodeLinks(node.element, node.links);
            autoResizeNode(node);
            if (state.selectedNodeIds.has(node.id)) renderLinkRows();
          });
        });

        row.appendChild(nameInput);
        row.appendChild(urlInput);
        row.appendChild(delBtn);
        list.appendChild(row);
      });
    }

    function onAddLink() {
      if (state.selectedNodeIds.size !== 1) return;
      const node = state.nodes[[...state.selectedNodeIds][0]];
      if (!node) return;
      const snapLinks = JSON.parse(JSON.stringify(node.links || []));
      node.links = node.links || [];
      node.links.push({ name: '', url: '' });
      renderLinkRows();
      const list = document.getElementById('props-links-list');
      if (list && list.lastElementChild) {
        const inputs = list.lastElementChild.querySelectorAll('input');
        if (inputs[1]) inputs[1].focus();
      }
      pushUndo(() => {
        node.links = JSON.parse(JSON.stringify(snapLinks));
        renderNodeLinks(node.element, node.links);
        autoResizeNode(node);
        if (state.selectedNodeIds.has(node.id)) renderLinkRows();
      });
    }

    // ── Delete ─────────────────────────────────────────────────────────────────

    function deleteSelected() {
      if (state.selectedNodeIds.size > 0) {
        const ids = [...state.selectedNodeIds].filter(id => {
          const n = state.nodes[id];
          return n && !n.locked;
        });
        if (ids.length === 0) return;

        const nodeSnaps = ids.map(snapshotNode);
        const connSnaps = Object.values(state.connections)
          .filter(c => ids.includes(c.fromNodeId) || ids.includes(c.toNodeId))
          .map(snapshotConnection);

        ids.forEach(id => state.selectedNodeIds.delete(id));
        ids.forEach(id => deleteNode(id));
        const seqsBefore = renumberNodes();
        updatePropsPanel();
        updateGroupResizeBox();

        pushUndo(() => {
          nodeSnaps.forEach(restoreNode);
          connSnaps.forEach(restoreConnection);
          restoreSeqs(seqsBefore);
        });

      } else if (state.selectedConnId) {
        const conn = state.connections[state.selectedConnId];
        const snap = snapshotConnection(conn);
        deleteConnection(state.selectedConnId);
        pushUndo(() => restoreConnection(snap));
      }
    }

    function deleteNode(nodeId) {
      const node = state.nodes[nodeId];
      if (!node) return;

      for (const connId of Object.keys(state.connections)) {
        const c = state.connections[connId];
        if (c.fromNodeId === nodeId || c.toNodeId === nodeId) {
          deleteConnection(connId);
        }
      }

      node.element.remove();
      delete state.nodes[nodeId];
      state.selectedNodeIds.delete(nodeId);
    }

    function renumberNodes() {
      const nodes = Object.values(state.nodes).sort((a, b) => (a.seq || 0) - (b.seq || 0));
      const before = nodes.map(n => ({ id: n.id, seq: n.seq }));
      nodes.forEach((n, i) => {
        const newSeq = i + 1;
        n.seq = newSeq;
        const seqEl = n.element.querySelector('.node-seq');
        if (seqEl) seqEl.textContent = newSeq;
      });
      state.seqCounter = nodes.length;
      if (state.selectedNodeIds.size === 1 && propSeq) {
        const id = [...state.selectedNodeIds][0];
        const n = state.nodes[id];
        if (n) propSeq.value = n.seq || '';
      }
      return before;
    }

    function restoreSeqs(snaps) {
      let max = 0;
      for (const s of snaps) {
        const n = state.nodes[s.id];
        if (!n) continue;
        n.seq = s.seq;
        const seqEl = n.element.querySelector('.node-seq');
        if (seqEl) seqEl.textContent = s.seq || '';
        if ((s.seq || 0) > max) max = s.seq || 0;
      }
      state.seqCounter = max;
      if (state.selectedNodeIds.size === 1 && propSeq) {
        const id = [...state.selectedNodeIds][0];
        const n = state.nodes[id];
        if (n) propSeq.value = n.seq || '';
      }
    }

    function deleteConnection(connId) {
      const conn = state.connections[connId];
      if (!conn) return;
      conn.pathElement.remove();
      if (conn.hitElement) conn.hitElement.remove();
      if (conn.labelElement) conn.labelElement.remove();
      delete state.connections[connId];

      if (state.selectedConnId === connId) {
        state.selectedConnId = null;
        hideConnEndpoints();
      }
    }

    // ── SVG click ──────────────────────────────────────────────────────────────

    function onSvgDblClick(e) {
      const path = e.target.closest('path.connection-hit, path.connection');
      if (path && path.dataset.connId) {
        e.preventDefault();
        e.stopPropagation();
        startConnLabelEdit(path.dataset.connId);
      }
    }

    function onSvgClick(e) {
      const path = e.target.closest('path.connection-hit, path.connection');
      if (path && path.dataset.connId) selectConnection(path.dataset.connId);
    }

    // ── Keyboard ───────────────────────────────────────────────────────────────

    function onKeyDown(e) {
      const tag = document.activeElement.tagName;
      const isInlineEdit = document.activeElement.contentEditable === 'true';

      if (tag === 'INPUT' || tag === 'TEXTAREA' || isInlineEdit) return;

      if (e.code === 'Space' && !spaceHeld) {
        e.preventDefault();
        // Space pans the canvas — drop focus from any button (e.g. a toolbar
        // button clicked earlier) so the spacebar doesn't also "press" it and
        // fire its click on keyup (which was triggering Save SVG/PNG prompts).
        const ae = document.activeElement;
        if (ae && ae !== document.body && typeof ae.blur === 'function') ae.blur();
        spaceHeld = true;
        if (!state.panning.active) canvasContainer.classList.add('space-held');
        return;
      }

      if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'z') {
        e.preventDefault();
        undo();
        return;
      }
      if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && (e.key === 'z' || e.key === 'Z')))) {
        e.preventDefault();
        redo();
        return;
      }

      if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
        e.preventDefault();
        openSearch();
        return;
      }

      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key) && state.selectedNodeIds.size > 0) {
        e.preventDefault();
        nudgeSelected(e.key, e.shiftKey ? 10 : 1);
        return;
      }

      if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C')) {
        e.preventDefault();
        copySelected();
        return;
      }
      if ((e.ctrlKey || e.metaKey) && (e.key === 'v' || e.key === 'V')) {
        e.preventDefault();
        pasteClipboard();
        return;
      }
      if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
      if (e.key === 'Escape') {
        if (state.connectMode.fromNodeId) {
          clearConnectSource();
        } else {
          clearSelection();
        }
      }

      if ((e.ctrlKey || e.metaKey) && !e.altKey && !e.shiftKey) {
        const shortcuts = {
          s: 'start', e: 'end', p: 'process', d: 'decision',
          n: 'note', b: 'database', a: 'api', q: 'queue'
        };
        const type = shortcuts[e.key.toLowerCase()];
        if (type) {
          e.preventDefault();
          createNodeAtCursor(type);
        }
      }
    }

    function copySelected() {
      if (state.selectedNodeIds.size === 0) return;
      const ids = [...state.selectedNodeIds];
      const nodes = ids.map(snapshotNode);
      const connections = Object.values(state.connections)
        .filter(c => ids.includes(c.fromNodeId) && ids.includes(c.toNodeId))
        .map(c => ({
          fromNodeId: c.fromNodeId, fromPort: c.fromPort,
          toNodeId: c.toNodeId, toPort: c.toPort,
          label: c.label || ''
        }));
      clipboard = { nodes, connections };
    }

    function pasteClipboard() {
      if (!clipboard || !clipboard.nodes.length) return;

      const rect = canvasContainer.getBoundingClientRect();
      let cx = lastMouseCX, cy = lastMouseCY;
      const inside = cx >= rect.left && cx <= rect.right &&
        cy >= rect.top && cy <= rect.bottom;
      if (!inside) {
        cx = rect.left + rect.width / 2;
        cy = rect.top + rect.height / 2;
      }
      const target = toWorldCoords(cx, cy);

      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const s of clipboard.nodes) {
        minX = Math.min(minX, s.x);
        minY = Math.min(minY, s.y);
        maxX = Math.max(maxX, s.x + s.width);
        maxY = Math.max(maxY, s.y + s.height);
      }
      const groupCx = (minX + maxX) / 2;
      const groupCy = (minY + maxY) / 2;
      const offX = target.x - groupCx;
      const offY = target.y - groupCy;

      const idMap = {};
      const newIds = [];

      for (const s of clipboard.nodes) {
        const node = createNode(s.type, Math.max(0, s.x + offX), Math.max(0, s.y + offY));
        node.label = s.label;
        node.notes = s.notes;
        node.responseTeam = s.responseTeam;
        node.links = JSON.parse(JSON.stringify(s.links || []));
        node.dbServer = s.dbServer || '';
        node.apiUrl = s.apiUrl || '';
        node.apiRequest = s.apiRequest || '';
        node.apiResponse = s.apiResponse || '';
        node.collapsed = s.collapsed || false;
        node.locked = s.locked || false;
        if (node.locked) node.element.classList.add('node--locked');
        node.customColor = s.customColor || null;
        if (node.customColor) applyNodeColor(node);
        node.width = s.width;
        node.height = s.height;

        node.element.style.width = s.width + 'px';
        node.element.style.height = s.height + 'px';
        const seqEl = node.element.querySelector('.node-seq');
        if (seqEl) seqEl.textContent = node.seq || '';
        setNodeLabelText(node.element, node.label);
        setNodeDesc(node.element, node.notes);
        renderNodeLinks(node.element, node.links);
        if (node.type === 'database') setDbServer(node.element, node.dbServer);
        if (node.type === 'api') { setApiUrl(node.element, node.apiUrl); setApiSections(node.element, node.apiRequest, node.apiResponse); }
        const collapseBtn = node.element.querySelector('.node-toggle-btn');
        if (node.collapsed && collapseBtn) {
          node.element.classList.add('node--collapsed');
          collapseBtn.textContent = '+';
        } else {
          node.collapsed = false;
        }

        idMap[s.id] = node.id;
        newIds.push(node.id);
      }

      for (const c of clipboard.connections) {
        const fromId = idMap[c.fromNodeId];
        const toId = idMap[c.toNodeId];
        const wps = (c.waypoints || []).map(p => ({ x: p.x + offX, y: p.y + offY }));
        if (fromId && toId) createConnection(fromId, c.fromPort, toId, c.toPort, c.label || '',
          { from: c.fromAnchored, to: c.toAnchored }, wps);
      }

      clearSelection();
      newIds.forEach(id => addToSelection(id));

      pushUndo(() => {
        newIds.forEach(id => { state.selectedNodeIds.delete(id); deleteNode(id); });
        renumberNodes();
        updatePropsPanel();
        updateGroupResizeBox();
        refreshConnectedHighlight();
      });
    }

    let searchEl = null;
    let searchMatches = [];
    let searchIndex = 0;

    function openSearch() {
      if (searchEl) { searchEl.querySelector('input').focus(); return; }
      searchEl = document.createElement('div');
      searchEl.className = 'search-bar';
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'Find by label or notes…';
      searchEl.appendChild(input);
      const count = document.createElement('span');
      count.className = 'search-count';
      searchEl.appendChild(count);
      document.body.appendChild(searchEl);
      input.focus();

      function runSearch() {
        const q = input.value.trim().toLowerCase();
        for (const n of Object.values(state.nodes)) {
          n.element.classList.remove('connected-highlight', 'dimmed');
        }
        if (!q) { searchMatches = []; count.textContent = ''; return; }
        searchMatches = Object.values(state.nodes).filter(n => {
          return (n.label || '').toLowerCase().includes(q) ||
            (n.notes || '').toLowerCase().includes(q);
        });
        if (searchMatches.length === 0) {
          count.textContent = 'No matches';
          for (const n of Object.values(state.nodes)) n.element.classList.add('dimmed');
          return;
        }
        searchIndex = 0;
        for (const n of Object.values(state.nodes)) {
          if (searchMatches.includes(n)) n.element.classList.add('connected-highlight');
          else n.element.classList.add('dimmed');
        }
        count.textContent = `1 / ${searchMatches.length}`;
        focusMatch();
      }

      function focusMatch() {
        if (searchMatches.length === 0) return;
        const n = searchMatches[searchIndex];
        clearSelection();
        addToSelection(n.id);
        const rect = canvasContainer.getBoundingClientRect();
        const cx = n.x + n.width / 2;
        const cy = n.y + n.height / 2;
        state.pan.x = rect.width / 2 - cx * state.zoom;
        state.pan.y = rect.height / 2 - cy * state.zoom;
        applyTransform();
        count.textContent = `${searchIndex + 1} / ${searchMatches.length}`;
        for (const m of Object.values(state.nodes)) {
          m.element.classList.remove('connected-highlight', 'dimmed');
        }
        for (const m of searchMatches) m.element.classList.add('connected-highlight');
        for (const m of Object.values(state.nodes)) {
          if (!searchMatches.includes(m)) m.element.classList.add('dimmed');
        }
      }

      input.addEventListener('input', runSearch);
      input.addEventListener('keydown', e => {
        e.stopPropagation();
        if (e.key === 'Escape') closeSearch();
        if (e.key === 'Enter') {
          if (searchMatches.length === 0) return;
          searchIndex = (searchIndex + (e.shiftKey ? -1 : 1) + searchMatches.length) % searchMatches.length;
          focusMatch();
        }
      });
    }

    function closeSearch() {
      if (!searchEl) return;
      searchEl.remove();
      searchEl = null;
      searchMatches = [];
      for (const n of Object.values(state.nodes)) {
        n.element.classList.remove('connected-highlight', 'dimmed');
      }
      refreshConnectedHighlight();
    }

    function toggleTheme() {
      const dark = document.documentElement.classList.toggle('dark');
      try { localStorage.setItem('flow:theme', dark ? 'dark' : 'light'); } catch { }
      updateThemeButton();
    }
    function updateThemeButton() {
      const btn = document.getElementById('btn-theme');
      if (!btn) return;
      const dark = document.documentElement.classList.contains('dark');
      btn.textContent = dark ? 'Light' : 'Dark';
      btn.title = dark ? 'Switch to light mode' : 'Switch to dark mode';
    }

    function applyNodeColor(node) {
      if (!node || !node.element) return;
      const el = node.element;
      if (node.customColor) {
        el.style.setProperty('--node-bg', node.customColor);
        el.classList.add('node--custom-color');
      } else {
        el.style.removeProperty('--node-bg');
        el.classList.remove('node--custom-color');
      }
    }

    const ALIGN_THRESHOLD = 5;
    let alignGuideEls = [];

    function computeAlignSnap(dx, dy) {
      const selected = [...state.selectedNodeIds].map(id => state.nodes[id]).filter(n => n && !n.locked);
      if (selected.length === 0) return { dx: 0, dy: 0, guides: [] };

      const others = Object.values(state.nodes).filter(n => !state.selectedNodeIds.has(n.id));
      if (others.length === 0) return { dx: 0, dy: 0, guides: [] };

      let bestDx = 0, bestDy = 0;
      let bestAbsX = ALIGN_THRESHOLD + 1, bestAbsY = ALIGN_THRESHOLD + 1;
      const guides = [];

      for (const sel of selected) {
        const nx = sel.x + dx, ny = sel.y + dy;
        const selXs = [nx, nx + sel.width / 2, nx + sel.width];
        const selYs = [ny, ny + sel.height / 2, ny + sel.height];

        for (const o of others) {
          const oxs = [o.x, o.x + o.width / 2, o.x + o.width];
          const oys = [o.y, o.y + o.height / 2, o.y + o.height];

          for (const sx of selXs) for (const ox of oxs) {
            const diff = ox - sx;
            if (Math.abs(diff) < bestAbsX) { bestAbsX = Math.abs(diff); bestDx = diff; }
          }
          for (const sy of selYs) for (const oy of oys) {
            const diff = oy - sy;
            if (Math.abs(diff) < bestAbsY) { bestAbsY = Math.abs(diff); bestDy = diff; }
          }
        }
      }

      const snapDx = bestAbsX <= ALIGN_THRESHOLD ? bestDx : 0;
      const snapDy = bestAbsY <= ALIGN_THRESHOLD ? bestDy : 0;

      for (const sel of selected) {
        const nx = sel.x + dx + snapDx, ny = sel.y + dy + snapDy;
        const selXs = { left: nx, cx: nx + sel.width / 2, right: nx + sel.width };
        const selYs = { top: ny, cy: ny + sel.height / 2, bottom: ny + sel.height };
        for (const o of others) {
          const oxs = { left: o.x, cx: o.x + o.width / 2, right: o.x + o.width };
          const oys = { top: o.y, cy: o.y + o.height / 2, bottom: o.y + o.height };
          for (const k1 of Object.keys(selXs)) for (const k2 of Object.keys(oxs)) {
            if (Math.abs(selXs[k1] - oxs[k2]) < 0.5) {
              const y1 = Math.min(ny, o.y) - 20;
              const y2 = Math.max(ny + sel.height, o.y + o.height) + 20;
              guides.push({ orient: 'vert', x: oxs[k2], y1, y2 });
            }
          }
          for (const k1 of Object.keys(selYs)) for (const k2 of Object.keys(oys)) {
            if (Math.abs(selYs[k1] - oys[k2]) < 0.5) {
              const x1 = Math.min(nx, o.x) - 20;
              const x2 = Math.max(nx + sel.width, o.x + o.width) + 20;
              guides.push({ orient: 'horiz', y: oys[k2], x1, x2 });
            }
          }
        }
      }

      return { dx: snapDx, dy: snapDy, guides };
    }

    function renderAlignGuides(guides) {
      for (const el of alignGuideEls) el.remove();
      alignGuideEls = [];
      for (const g of guides) {
        const el = document.createElement('div');
        el.className = 'align-guide ' + g.orient;
        if (g.orient === 'vert') {
          el.style.left = g.x + 'px';
          el.style.top = g.y1 + 'px';
          el.style.height = (g.y2 - g.y1) + 'px';
        } else {
          el.style.top = g.y + 'px';
          el.style.left = g.x1 + 'px';
          el.style.width = (g.x2 - g.x1) + 'px';
        }
        canvasNodes.appendChild(el);
        alignGuideEls.push(el);
      }
    }

    function clearAlignGuides() {
      for (const el of alignGuideEls) el.remove();
      alignGuideEls = [];
    }

    function reorderSelected(where) {
      if (state.selectedNodeIds.size === 0) return;
      const ids = [...state.selectedNodeIds];
      const prevOrder = Array.from(canvasNodes.children);

      for (const id of ids) {
        const n = state.nodes[id];
        if (!n || !n.element) continue;
        if (where === 'front') canvasNodes.appendChild(n.element);
        else canvasNodes.insertBefore(n.element, canvasNodes.firstChild);
      }

      pushUndo(() => {
        for (const el of prevOrder) canvasNodes.appendChild(el);
      });
    }

    function nudgeSelected(arrowKey, step) {
      let dx = 0, dy = 0;
      if (arrowKey === 'ArrowLeft') dx = -step;
      if (arrowKey === 'ArrowRight') dx = step;
      if (arrowKey === 'ArrowUp') dy = -step;
      if (arrowKey === 'ArrowDown') dy = step;

      const before = {};
      for (const id of state.selectedNodeIds) {
        const n = state.nodes[id];
        if (!n || n.locked) continue;
        before[id] = { x: n.x, y: n.y };
        n.x += dx;
        n.y += dy;
        n.element.style.left = n.x + 'px';
        n.element.style.top = n.y + 'px';
        updateConnectionsForNode(id);
      }

      if (state.groupBoxEl) {
        const bb = getSelectionBBox();
        if (bb) {
          state.groupBoxEl.style.left = bb.x + 'px';
          state.groupBoxEl.style.top = bb.y + 'px';
        }
      }

      if (Object.keys(before).length) {
        pushUndo(() => {
          for (const id of Object.keys(before)) {
            const n = state.nodes[id];
            if (!n) continue;
            n.x = before[id].x; n.y = before[id].y;
            n.element.style.left = n.x + 'px';
            n.element.style.top = n.y + 'px';
            updateConnectionsForNode(id);
          }
          if (state.groupBoxEl) {
            const bb = getSelectionBBox();
            if (bb) {
              state.groupBoxEl.style.left = bb.x + 'px';
              state.groupBoxEl.style.top = bb.y + 'px';
            }
          }
        });
      }
    }

    function createNodeAtCursor(type) {
      const rect = canvasContainer.getBoundingClientRect();
      let cx = lastMouseCX, cy = lastMouseCY;
      const insideCanvas = cx >= rect.left && cx <= rect.right &&
        cy >= rect.top && cy <= rect.bottom;
      if (!insideCanvas) {
        cx = rect.left + rect.width / 2;
        cy = rect.top + rect.height / 2;
      }
      const dims = NODE_DIMS[type] || NODE_DIMS.process;
      const wc = toWorldCoords(cx, cy);
      const x = Math.max(0, wc.x - dims.width / 2);
      const y = Math.max(0, wc.y - dims.height / 2);

      clearSelection();
      const node = createNode(type, x, y);
      addToSelection(node.id);

      const nodeId = node.id;
      pushUndo(() => {
        state.selectedNodeIds.delete(nodeId);
        deleteNode(nodeId);
        renumberNodes();
        updatePropsPanel();
      });
    }

    function onKeyUp(e) {
      if (e.code === 'Space') {
        spaceHeld = false;
        canvasContainer.classList.remove('space-held');
        if (!state.panning.active) canvasContainer.classList.remove('panning');
      }
    }

    // ── Clear all ──────────────────────────────────────────────────────────────

    function clearAll() {
      if (!confirm('Clear all components and connections?')) return;

      const nodeSnaps = Object.keys(state.nodes).map(snapshotNode);
      const connSnaps = Object.values(state.connections).map(snapshotConnection);

      for (const id of Object.keys(state.connections)) deleteConnection(id);
      for (const id of Object.keys(state.nodes)) deleteNode(id);
      clearSelection();

      pushUndo(() => {
        nodeSnaps.forEach(restoreNode);
        connSnaps.forEach(restoreConnection);
      });
    }

    // ── Export ─────────────────────────────────────────────────────────────────

    function serializeState() {
      return {
        nodes: Object.values(state.nodes).map(n => ({
          id: n.id, type: n.type, seq: n.seq,
          label: n.label, notes: n.notes, responseTeam: n.responseTeam,
          links: n.links || [],
          dbServer: n.dbServer || '',
          apiUrl: n.apiUrl || '', apiRequest: n.apiRequest || '', apiResponse: n.apiResponse || '',
          collapsed: n.collapsed || false,
          locked: n.locked || false,
          customColor: n.customColor || null,
          x: n.x, y: n.y, width: n.width, height: n.height
        })),
        connections: Object.values(state.connections).map(c => ({
          id: c.id, fromNodeId: c.fromNodeId, fromPort: c.fromPort,
          toNodeId: c.toNodeId, toPort: c.toPort, label: c.label || '',
          fromAnchored: !!c.fromAnchored, toAnchored: !!c.toAnchored,
          waypoints: (c.waypoints || []).map(p => ({ x: p.x, y: p.y }))
        }))
      };
    }

    function exportDiagram() {
      const data = serializeState();
      const input = window.prompt('Save as:', 'flow-diagram');
      if (input === null) return;
      const filename = (input.trim() || 'flow-diagram').replace(/\.json$/i, '') + '.json';

      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
      clearAutosave();
    }

    // ── Autosave ───────────────────────────────────────────────────────────────
    const AUTOSAVE_KEY = 'flow:autosave';
    let autosaveTimer = null;

    function scheduleAutosave() {
      if (autosaveTimer) clearTimeout(autosaveTimer);
      autosaveTimer = setTimeout(() => {
        autosaveTimer = null;
        try {
          const data = serializeState();
          if (data.nodes.length === 0 && data.connections.length === 0) {
            localStorage.removeItem(AUTOSAVE_KEY);
          } else {
            localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(data));
          }
        } catch { }
      }, 600);
    }

    function clearAutosave() {
      try { localStorage.removeItem(AUTOSAVE_KEY); } catch { }
    }

    function tryRestoreAutosave() {
      let raw;
      try { raw = localStorage.getItem(AUTOSAVE_KEY); } catch { return; }
      if (!raw) return;
      let data;
      try { data = JSON.parse(raw); } catch { return; }
      if (!data || !Array.isArray(data.nodes) || data.nodes.length === 0) return;
      if (confirm('Restore your previous session?')) {
        undoing = true;
        loadDiagram(data);
        undoing = false;
      } else {
        clearAutosave();
      }
    }

    // ── Import ─────────────────────────────────────────────────────────────────

    function importDiagram(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = ev => {
        try { loadDiagram(JSON.parse(ev.target.result)); }
        catch { alert('Invalid JSON file.'); }
      };
      reader.readAsText(file);
      e.target.value = '';
    }

    function loadDiagram(data) {
      for (const id of Object.keys(state.connections)) deleteConnection(id);
      for (const id of Object.keys(state.nodes)) deleteNode(id);
      clearSelection();

      (data.nodes || []).forEach(n => {
        const node = createNode(n.type, n.x, n.y);
        const tempId = node.id;
        node.seq = n.seq || node.seq;
        node.label = n.label;
        node.notes = n.notes || '';
        node.responseTeam = n.responseTeam || '';
        node.dbServer = n.dbServer || '';
        node.apiUrl = n.apiUrl || '';
        node.apiRequest = n.apiRequest || '';
        node.apiResponse = n.apiResponse || '';
        node.collapsed = n.collapsed || false;
        node.locked = n.locked || false;
        if (node.locked) node.element.classList.add('node--locked');
        node.customColor = n.customColor || null;
        if (node.customColor) applyNodeColor(node);
        // migrate legacy single-link githubUrl
        if (Array.isArray(n.links)) {
          node.links = n.links;
        } else if (n.githubUrl && n.githubUrl.trim()) {
          node.links = [{ name: 'GitHub', url: n.githubUrl.trim() }];
        } else {
          node.links = [];
        }
        if (n.width) { node.width = n.width; node.element.style.width = n.width + 'px'; }
        if (n.height) { node.height = n.height; node.element.style.height = n.height + 'px'; }
        node.element.querySelector('.node-seq').textContent = node.seq || '';
        setNodeLabelText(node.element, n.label);
        setNodeDesc(node.element, node.notes);
        renderNodeLinks(node.element, node.links);
        if (node.type === 'database') setDbServer(node.element, node.dbServer);
        if (node.type === 'api') { setApiUrl(node.element, node.apiUrl); setApiSections(node.element, node.apiRequest, node.apiResponse); }
        const collapseBtn = node.element.querySelector('.node-toggle-btn');
        if (node.collapsed && collapseBtn) {
          node.element.classList.add('node--collapsed');
          collapseBtn.textContent = '+';
        } else {
          node.collapsed = false;
        }
        delete state.nodes[tempId];
        node.id = n.id;
        node.element.dataset.nodeId = n.id;
        state.nodes[n.id] = node;
